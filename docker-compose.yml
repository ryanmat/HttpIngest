# Description: Docker Compose configuration for LogicMonitor Data Pipeline local development
# Description: Provides PostgreSQL database, Redis pub/sub, and the application service

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17.5-alpine
    container_name: lm-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./alembic/versions:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lm-network

  # Redis for Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: lm-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lm-network

  # Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lm-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database Configuration
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_CONN_STR: postgresql://postgres:postgres@postgres:5432/postgres

      # Redis Configuration
      REDIS_URL: redis://redis:6379
      USE_REDIS: "true"

      # Application Settings
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: "1"

      # Azure Functions (for local testing)
      AzureWebJobsStorage: UseDevelopmentStorage=true
      FUNCTIONS_WORKER_RUNTIME: python
    ports:
      # Azure Functions HTTP endpoints
      - "7071:7071"
      # FastAPI endpoints
      - "8000:8000"
    volumes:
      # Mount source code for development
      - .:/app
      # Preserve Python cache
      - python_cache:/root/.cache
    networks:
      - lm-network
    command: >
      sh -c "
        echo '🔧 Running database migrations...' &&
        uv run alembic upgrade head &&
        echo '🚀 Starting application...' &&
        uv run python -m uvicorn function_app:fastapi_app --host 0.0.0.0 --port 8000 --reload
      "

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: lm-grafana
    depends_on:
      - app
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: simpod-json-datasource
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - lm-network

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: lm-prometheus
    depends_on:
      - app
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - lm-network

volumes:
  postgres_data:
    driver: local
  python_cache:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  lm-network:
    driver: bridge
