[project]
name = "httpingest"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "alembic>=1.17.1",
    "asyncpg>=0.29.0",
    "azure-functions>=1.24.0",
    "azure-identity>=1.19.0",
    "psycopg2-binary>=2.9.11",
    "pytest>=9.0.1",
    "pytest-asyncio>=1.3.0",
    "numpy>=1.26.0",
    "pandas>=2.1.0",
    "requests>=2.32.5",
    "websockets>=15.0.1",
    "fastapi>=0.121.2",
    "uvicorn[standard]>=0.32.0",
    "sse-starlette>=3.0.3",
    "redis>=7.0.1",
]

[dependency-groups]
dev = [
    "aiohttp>=3.13.2",
    "httpx>=0.27.0",
    "pytest-cov>=7.0.0",
    "ruff>=0.14.5",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Ignore unused ML and legacy test files (kept locally for future work)
addopts = """
    --ignore=tests/test_anomaly_detector.py
    --ignore=tests/test_feature_engineering.py
    --ignore=tests/test_predictor.py
    --ignore=tests/test_data_processor.py
    --ignore=tests/test_e2e_integration.py
    --ignore=tests/test_function_app.py
    --ignore=tests/test_query_endpoints.py
"""
