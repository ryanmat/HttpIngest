# Description: Prometheus configuration for scraping metrics from LogicMonitor Data Pipeline
# Description: Scrapes the /metrics/prometheus endpoint every 15 seconds

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'lm-data-pipeline'
    environment: 'local'

# Scrape configurations
scrape_configs:
  # LogicMonitor Data Pipeline metrics
  - job_name: 'lm-pipeline'
    metrics_path: '/metrics/prometheus'
    static_configs:
      - targets: ['app:8000']
        labels:
          service: 'data-pipeline'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# Alerting configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files (optional)
rule_files:
  # - "alerts/*.yml"
